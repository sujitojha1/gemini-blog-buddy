<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gemini Blog Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <header class="card__header">
        <div class="badge">
          <svg class="sparkle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          </svg>
          Gemini Blog Buddy
        </div>
      </header>

      <div class="actions">
        <div class="action-buttons">
          <div style="display: flex; gap: 8px; flex: 1;">
            <button
              id="randomBlogBtn"
              type="button"
              class="btn-icon-only btn-secondary"
              title="Surprise Me"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                <polyline points="16 3 21 3 21 8"/>
                <line x1="4" x2="21" y1="20" y2="3"/>
                <polyline points="21 16 21 21 16 21"/>
                <line x1="15" x2="21" y1="15" y2="21"/>
                <line x1="4" x2="9" y1="4" y2="9"/>
              </svg>
            </button>
            <button
              id="listTodayBtn"
              type="button"
              class="btn-icon-only btn-secondary"
              title="List the pages for today"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </button>
            <button
              id="listSourcesBtn"
              type="button"
              class="btn-icon-only btn-secondary"
              title="Review list of sources"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
              </svg>
            </button>
            <button
              id="refreshDbBtn"
              type="button"
              class="btn-icon-only btn-secondary"
              title="Reload the database with more articles"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
          </div>

          <button
            id="indexBtn"
            type="button"
            class="btn btn-primary btn-with-icon"
            title="Index the current page to your processed blogs"
            style="flex: none; padding: 10px 18px;"
          >
            <span class="btn-icon" aria-hidden="true" style="margin-right: -2px;">
              <!-- Upload/Plus Icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" x2="12" y1="3" y2="15"/>
              </svg>
            </span>
            <span class="btn-text" style="flex: none;">Save</span>
          </button>
        </div>
      </div>

      <section class="search-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <h3 class="section-title" style="margin: 0;">Knowledge Base</h3>
          <button id="settingsToggleBtn" type="button" class="btn-ghost" style="padding: 2px; color: #94a3b8; border: none; background: transparent; cursor: pointer;" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <div id="settingsPane" style="display: none; flex-direction: column; gap: 8px; margin-bottom: 12px; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
          <label for="apiHostnameInput" style="font-size: 11px; color: #475569; font-weight: 600;">API Base URL</label>
          <div style="display: flex; gap: 6px;">
            <input id="apiHostnameInput" type="text" placeholder="http://localhost:8000" style="padding: 6px 10px; font-size: 12px; flex: 1;" />
            <button id="saveSettingsBtn" type="button" class="btn btn-secondary" style="flex: none; padding: 6px 12px; font-size: 12px;">Save</button>
          </div>
        </div>
        <div class="search-row">
          <input
            id="query"
            type="text"
            placeholder="Type a concept or keyword..."
            autocomplete="off"
          />
          <button
            id="searchBtn"
            type="button"
            class="btn btn-ghost btn-icon-only"
            title="Search your indexed content"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" x2="16.65" y1="21" y2="16.65"/>
            </svg>
          </button>
        </div>
      </section>

      <section id="results" class="results" aria-live="polite"></section>

      <!-- Status footer is used by JS for feedback -->
      <div class="status-footer">
        <p id="status" role="status" class="status">Waiting for action...</p>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
